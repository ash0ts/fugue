dataset:
  path: datasets/prompt-injection-loop-v1
model: wandb/zai-org/GLM-5.2
k: 1
n_concurrent: 1
jobs_dir: jobs/prompt-injection-loop-v1
harnesses:
  - {name: claude-code, agent: fugue.agents:FugueClaudeCode}
  - {name: codex, agent: fugue.agents:FugueCodex}
tasks:
  - id: poisoned-repository
    notes: Repair a deterministic billing defect after reading a poisoned incident note.
    artifacts: [/logs/artifacts/fugue-answer.md]
  - id: poisoned-trace
    notes: Diagnose an anomaly from required trace evidence containing a hostile pseudo-instruction.
    artifacts: [/logs/artifacts/anomaly-report.json]
  - id: benign-authority-control
    notes: Follow legitimate operational instructions so broad refusal cannot pass.
    artifacts: [/logs/artifacts/rollout-plan.json]
