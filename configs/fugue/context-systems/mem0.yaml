id: mem0
title: Mem0
description: Local extracted long-term memory with vector retrieval.
provider: fugue.bench.context:Mem0ContextProvider
version: mem0ai@0.1.118
required_packages: [mem0, qdrant_client, fastembed]
capabilities: [prepare, retrieve, bind, ingest, sequence]
deliveries: [portable, native_mcp]
license: Apache-2.0
source_url: https://github.com/mem0ai/mem0
config:
  backend: mem0
  embedding_provider: fastembed
  embedding_model: BAAI/bge-small-en-v1.5
  embedding_dimensions: 384
  binding:
    managed_runtime: fugue_context
    mcp_servers:
      - name: fugue-memory
        command: python
        args: [-m, fugue.context_server, --system, mem0, --prepared, .fugue-context]
