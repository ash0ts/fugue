id: rag-dense
title: Fugue RAG (dense)
description: Controlled dense retrieval baseline with local FastEmbed and LanceDB.
provider: fugue.bench.context:RagContextProvider
version: "1"
capabilities: [prepare, retrieve, bind]
required_packages: [fastembed, lancedb]
license: Fugue
config:
  mode: dense
  lines_per_chunk: 80
  line_overlap: 20
  embedding_model: BAAI/bge-small-en-v1.5
  binding:
    mcp_servers:
      - name: fugue-context
        command: python
        args: [-m, fugue.context_server, --system, rag-dense, --prepared, .fugue-context]
