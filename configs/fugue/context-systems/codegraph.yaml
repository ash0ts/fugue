id: codegraph
title: CodeGraph
description: Local SQLite code graph exposed through native MCP tools.
provider: fugue.bench.context:CommandContextProvider
version: "@colbymchenry/codegraph@0.7.9"
support: experimental
capabilities: [prepare, bind]
deliveries: [native_mcp]
required_commands: [npx]
license: MIT
source_url: https://github.com/colbymchenry/codegraph
enabled_by_default: false
config:
  prepare:
    command: [npx, -y, "@colbymchenry/codegraph@0.7.9", init, -i]
    copy_paths: [.codegraph]
  binding:
    mcp_servers:
      - name: codegraph
        command: npx
        args: [-y, "@colbymchenry/codegraph@0.7.9", serve, --mcp]
        cwd: .fugue-context/artifact
