id: codegraph
title: CodeGraph
description: Local SQLite code graph exposed through native MCP tools.
provider: fugue.bench.context:CommandContextProvider
version: "@colbymchenry/codegraph@0.9.0"
support: experimental
capabilities: [prepare, bind]
deliveries: [native_mcp]
license: MIT
source_url: https://github.com/colbymchenry/codegraph
enabled_by_default: false
config:
  prepare:
    copy_repository: true
  binding:
    managed_runtime: pinned_mcp
    repository_path: /workspace/repository
    extra_instruction_paths: ["{artifact}/FUGUE_NATIVE_MCP.md"]
