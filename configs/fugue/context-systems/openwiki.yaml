id: openwiki
title: OpenWiki
description: Generated repository wiki injected as files.
provider: fugue.bench.context:CommandContextProvider
version: openwiki@0.1.1
capabilities: [prepare, bind]
required_commands: [npx]
license: MIT
source_url: https://github.com/langchain-ai/openwiki
config:
  prepare:
    command: [npx, -y, "openwiki@0.1.1", code, --update, --print]
    copy_paths: [openwiki, AGENTS.md, CLAUDE.md]
    env:
      OPENWIKI_PROVIDER: openai-compatible
      OPENAI_COMPATIBLE_API_KEY: ${LITELLM_MASTER_KEY}
      OPENAI_COMPATIBLE_BASE_URL: http://127.0.0.1:4000/v1
      OPENWIKI_MODEL_ID: fugue-builder
