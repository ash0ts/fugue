id: latmd
title: lat.md
description: Experimental pinned lat.md lattice and MCP integration; validate with the opt-in runtime preflight before use.
provider: fugue.bench.context:LatMdContextProvider
version: lat.md@0.11.0
support: experimental
capabilities: [prepare, retrieve, bind, ingest, sequence]
deliveries: [native_mcp]
required_env: [LAT_LLM_KEY, FUGUE_ENABLE_EXPERIMENTAL_LATMD]
license: MIT
source_url: https://github.com/1st1/lat.md
enabled_by_default: false
config:
  prepare:
    copy_repository: true
  binding:
    managed_runtime: pinned_mcp
    repository_path: /workspace/repository
    extra_instruction_paths: ["{artifact}/FUGUE_NATIVE_MCP.md"]
