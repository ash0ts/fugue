interactors:
  - id: scripted-reviewer-v1
    title: Scripted evaluation user
    kind: scripted
    directions: []
    supported_harnesses: [hermes, openclaw, claude-code, codex, wba-responses]
    input_cost_per_million: 0
    output_cost_per_million: 0
    reserve_cost_usd: 0
  - id: evidence-clarifier-v1
    title: Evidence-seeking evaluation user
    kind: model
    model: openai/gpt-5
    directions:
      - Ask only for evidence needed to resolve the declared task.
      - Do not reveal criteria, expected answers, or private references.
    supported_harnesses: [hermes, openclaw, claude-code, codex]
    input_cost_per_million: 0
    output_cost_per_million: 0
    reserve_cost_usd: 0.5
