      - Do not reveal criteria, expected answers, or private references.
    supported_harnesses: [hermes, openclaw, claude-code, codex]
    input_cost_per_million: 0
    output_cost_per_million: 0
    reserve_cost_usd: 0.5
judges:
  - id: grounded-analysis-v1
    title: Blind grounded analysis judge
    model: openai/gpt-5
    prompt: Judge whether the response satisfies the criterion using only the supplied evidence. Do not infer the harness, model, treatment, or expected answer.
    evidence: [answer, artifacts, benchmark, changed_paths, opened_paths, tool_calls, trace_summary]
    blind_fields: [harness, model, variant_id, context_system_id, candidate_id, treatment]
    input_cost_per_million: 0
