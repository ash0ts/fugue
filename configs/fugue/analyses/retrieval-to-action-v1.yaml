id: retrieval-to-action-v1
title: Retrieval-to-action mechanism analysis
question: Does dense repository memory improve hard-SWE outcomes by itself, or only when an Agent is required to inspect, verify, and act on retrieved evidence?
filters:
  experiment_id: retrieval-to-action
  tag: retrieval-to-action-v1
group_by: [variant_id, harness, context_system_id, model]
metrics:
  - pass_rate
  - context_invocation_rate
  - retrieval_recall_at_5
  - retrieval_recall_at_10
  - relevant_retrieval_open_rate
  - relevant_retrieval_change_rate
  - context_result_open_rate
  - context_result_change_rate
  - off_target_change_only_rate
  - premature_completion_rate
  - wall_time_sec
  - tokens
  - cost_usd
source: hybrid
include_artifacts: false
selection:
  selection_unit: variant
  baseline_variant_id: baseline
  metric: pass_rate
  confidence: 0.95
  noninferiority_margin: 0.05
  require_complete_grid: true
  required_examples: 4
  required_harnesses: [claude-code, codex]
  require_agent_links: true
  bootstrap_samples: 2000
  tie_breakers: [localization_recall_at_10, localization_mrr, recoverable_error_rate, cost_per_success]
  minimum_pass_rate_improvement: 0.05
  minimum_cost_improvement: 0.15
  minimum_latency_improvement: 0.15
