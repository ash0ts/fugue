id: pilot
title: Pilot experiment
description: Default Fugue experiment for comparing harnesses, prompts, skills, and optional features.
manifest: datasets/pilot.yaml
model: wandb/zai-org/GLM-5.2
run_name: pilot
tags:
  - pilot
harnesses:
  - hermes
  - openclaw
  - claude-code
  - codex
variants:
  - id: baseline
    label: Baseline
    context:
      system_id: none
  - id: prompt-skill
    label: Prompt + skill
    prompt_id: repository-memory
    skills:
      - repository-orientation
    context:
      system_id: none
  - id: context-skill
    label: Repository context + skill
    prompt_id: repository-memory
    skills:
      - repository-orientation
    context:
      system_id: agentsmd
n_attempts: 1
n_concurrent: 2
jobs_dir: jobs/pilot
environment:
  type: docker
  cpu_enforcement_policy: auto
  memory_enforcement_policy: auto
