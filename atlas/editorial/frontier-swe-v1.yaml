schema_version: 1
id: frontier-swe-v1
title: Frontier model × harness baseline
summary: A planned capability map across fixed frontier models, four harnesses, and eight locked hard SWE-bench discovery tasks with no added context.
question: How much of hard SWE-bench performance comes from the model, the agent harness, and their interaction before memory is added?
hypothesis: Harness effects will interact with model capability and efficiency; a single model or single harness will not represent the frontier.
why_it_matters: Memory lift is uninterpretable without a fixed no-context capability baseline. This matrix establishes that denominator and exposes cost and latency tradeoffs without combining them into a synthetic score.
task_selection: The locked discovery partition requires production and test changes, two to eight touched files, repository diversity, and either lexical mismatch or cross-directory production work.
evidence_tier: active
decision_value: 100
status: ready_for_canaries
