findings:
  - All four harnesses completed with one verified conversation, Agent root, and evaluation link per prediction.
  - Claude Code, Hermes, and OpenClaw resolved the canary task; Codex completed cleanly but did not resolve it.
caveats:
  - This record proves routing and observability only; a one-task canary is not a capability benchmark.
  - The later Opus cohort was cancelled after Codex reproduced an Anthropic tool-history failure on another task.
  - Raw Agent conversations and tool content remain in authenticated Weave.
