id: opus-4-8-contract
title: Claude Opus 4.8 routing contract
summary: A four-harness, one-task canary proving direct Anthropic routing, terminal Agent execution, and exact evaluation links on the frozen frontier runtime.
question: Can Claude Opus 4.8 execute the same hard task through every supported Agent harness while preserving Fugue's provider and observability contracts?
hypothesis: All four harnesses can complete one direct-Anthropic Agent prediction without W&B Inference traffic or trial-time preparation.
why_it_matters: A model cohort is not admissible until routing, tool execution, terminal state, and evaluation-to-Agent navigation work across every selected harness.
task_selection: The canary uses the first locked hard discovery task so its runtime, verifier, and comparison identity match the planned frontier cohort.
