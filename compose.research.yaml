name: fugue-research

x-fugue-image: &fugue-image
  image: ${FUGUE_RESEARCH_IMAGE:-fugue-research:local}
  build:
    context: .
    dockerfile: Dockerfile.research

services:
  fugue-init:
    <<: *fugue-image
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mkdir -p ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/home &&
        chown -R ${FUGUE_HOST_UID:?run fugue research bootstrap first}:${FUGUE_HOST_GID:?run fugue research bootstrap first}
        ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue
    volumes:
      - fugue-state:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue
    restart: "no"

  fugue-control:
    <<: *fugue-image
    user: "${FUGUE_HOST_UID:?run fugue research bootstrap first}:${FUGUE_HOST_GID:?run fugue research bootstrap first}"
    working_dir: ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}
    environment:
      HOME: ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/home
      FUGUE_RESEARCH_API_KEY_FILE: /run/secrets/research_api_key
      FUGUE_RESEARCH_CANDIDATE_SOURCES: /etc/fugue/candidate-sources.yaml
      FUGUE_RESEARCH_TRACE_SOURCES: /etc/fugue/trace-sources.yaml
      WANDB_API_KEY_FILE: /run/secrets/wandb_api_key
    secrets:
      - research_api_key
      - wandb_api_key
    volumes:
      # The worker talks to the host Docker daemon. Keeping the checkout at the
      # same absolute path on both sides makes generated Harbor bind mounts
      # resolvable by that daemon instead of leaking container-only /workspace
      # paths into trial configurations.
      - ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}:ro
      - ${FUGUE_GIT_COMMON_DIR:?run fugue research bootstrap first}:${FUGUE_GIT_COMMON_DIR:?run fugue research bootstrap first}:ro
      - fugue-state:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue
      - ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/runtime:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/runtime:ro
      - ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/cache:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/cache:ro
      - ${FUGUE_TRACE_SOURCES_FILE:-./configs/fugue/research/trace-sources.yaml}:/etc/fugue/trace-sources.yaml:ro
      - ${FUGUE_CANDIDATE_SOURCES_FILE:-./configs/fugue/research/candidate-sources.yaml}:/etc/fugue/candidate-sources.yaml:ro
      - ${FUGUE_TRACE_DATA_DIR:-./.fugue/trace-data}:/data/traces:ro
    command:
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "8787"
      - --repo-root
      - ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}
      - --trace-sources
      - /etc/fugue/trace-sources.yaml
      - --candidate-sources
      - /etc/fugue/candidate-sources.yaml
    depends_on:
      fugue-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8787:8787"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8787/readyz', timeout=2)"
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  fugue-worker:
    <<: *fugue-image
    user: "${FUGUE_HOST_UID:?run fugue research bootstrap first}:${FUGUE_HOST_GID:?run fugue research bootstrap first}"
    working_dir: ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}
    group_add:
      - "${FUGUE_DOCKER_GID:?run fugue research bootstrap first}"
    environment:
      HOME: ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/home
      FUGUE_BRIDGE_HEALTH_TRANSPORT: docker-exec
      FUGUE_RESEARCH_CANDIDATE_SOURCES: /etc/fugue/candidate-sources.yaml
      WANDB_API_KEY_FILE: /run/secrets/wandb_api_key
    secrets:
      - wandb_api_key
    command:
      - worker
      - --repo-root
      - ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}
      - --poll-interval
      - "1"
      - --candidate-sources
      - /etc/fugue/candidate-sources.yaml
    depends_on:
      fugue-init:
        condition: service_completed_successfully
      fugue-control:
        condition: service_healthy
    volumes:
      - ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}:ro
      - ${FUGUE_GIT_COMMON_DIR:?run fugue research bootstrap first}:${FUGUE_GIT_COMMON_DIR:?run fugue research bootstrap first}:ro
      - fugue-state:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue
      - ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/runtime:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/runtime
      - ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/cache:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/cache
      - ${FUGUE_CANDIDATE_SOURCES_FILE:-./configs/fugue/research/candidate-sources.yaml}:/etc/fugue/candidate-sources.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  fugue-operator:
    <<: *fugue-image
    profiles: [operator]
    user: "${FUGUE_HOST_UID:?run fugue research bootstrap first}:${FUGUE_HOST_GID:?run fugue research bootstrap first}"
    working_dir: ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}
    environment:
      HOME: ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue/home
    command: ["--help"]
    depends_on:
      fugue-init:
        condition: service_completed_successfully
    volumes:
      - ${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}:ro
      - ${FUGUE_GIT_COMMON_DIR:?run fugue research bootstrap first}:${FUGUE_GIT_COMMON_DIR:?run fugue research bootstrap first}:ro
      - fugue-state:${FUGUE_HOST_REPO_ROOT:?run fugue research bootstrap first}/.fugue
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: "no"

volumes:
  fugue-state:

secrets:
  research_api_key:
    file: ${FUGUE_RESEARCH_API_KEY_FILE:-./.fugue/secrets/research_api_key}
  wandb_api_key:
    file: ${WANDB_API_KEY_FILE:-./.fugue/secrets/wandb_api_key}
